name: Build registry

on:
  push:
    branches: [main]
    paths:
      - 'mods/**'
      - 'scripts/build-registry.mjs'

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          # Use a PAT from a Repository admin so the auto-commit bypasses the
          # main-branch ruleset (the default GITHUB_TOKEN runs as
          # github-actions[bot] which has no admin bypass).
          token: ${{ secrets.REGISTRY_BOT_TOKEN }}

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build registry
        run: pnpm build-registry

      - name: Commit registry.json
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add registry.json
          git diff --staged --quiet || git commit -m "Rebuild registry"
          git push
