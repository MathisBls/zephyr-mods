name: Validate PR

on:
  pull_request:

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Validate mod tree
        run: pnpm validate

      - name: Verify ownership lock
        env:
          PR_AUTHOR: ${{ github.event.pull_request.user.login }}
        run: node .github/workflows/check-ownership.mjs
